workflows:
  filza-minizip-build:
    name: Filza Minizip Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Check repository files
        script: |
          pwd
          find . -maxdepth 3 -type f -print

      - name: Check project directory
        script: |
          test -d FilzaMinizip
          ls -la FilzaMinizip

      - name: Run build script
        script: |
          chmod +x FilzaMinizip/build.sh
          ./FilzaMinizip/build.sh

    artifacts:
      - FilzaMinizip/output/*.ipa
      - FilzaMinizip/output/*.dylib
      - FilzaMinizip/output/*.zip
