workflows:
  amethyst-ios-build:
    name: Amethyst改版測試
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      vars:
        PLATFORM: "2"
        RELEASE: "1"
        SLIMMED: "1"

    scripts:
      - name: 還原分包原始碼
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"

          rm -rf Source

          found_archive=0
          for archive in Source_Part*.zip; do
            if [ -f "$archive" ]; then
              found_archive=1
              echo "正在解壓：$archive"
              unzip -q -o "$archive" -d "$CM_BUILD_DIR"
            fi
          done

          if [ "$found_archive" -ne 1 ]; then
            echo "錯誤：找不到 Source_Part*.zip"
            exit 1
          fi

          test -d "$CM_BUILD_DIR/Source/Amethyst.xcodeproj"
          test -f "$CM_BUILD_DIR/Source/Makefile"

      - name: 安裝建置工具
        script: |
          set -euo pipefail
          brew update
          brew install make cmake wget ldid

          if ! /usr/libexec/java_home -v 1.8 >/dev/null 2>&1; then
            brew install --cask temurin@8
          fi

      - name: 還原其餘 Git 子模組
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/Source"

          if [ ! -f .gitmodules ]; then
            echo "錯誤：Source/.gitmodules 不存在"
            exit 1
          fi

          git config -f .gitmodules --get-regexp '^submodule\..*\.path$' |
          while read -r key path; do
            name="${key#submodule.}"
            name="${name%.path}"
            url="$(git config -f .gitmodules --get "submodule.${name}.url")"

            if [ "$path" = "Natives/external/MobileGlues" ]; then
              continue
            fi

            echo "準備子模組：$path"
            rm -rf "$path"
            mkdir -p "$(dirname "$path")"

            case "$url" in
              ../*)
                url="https://github.com/AngelAuraMC/${url#../}"
                ;;
              ./*)
                url="https://github.com/AngelAuraMC/${url#./}"
                ;;
            esac

            git clone --depth 1 --recursive "$url" "$path"
          done

          test -f Natives/external/AFNetworking/AFNetworking/AFSecurityPolicy.m
          test -f Natives/external/fishhook/fishhook.c

          echo "其餘 Git 子模組準備完成"

      - name: 準備 MobileGlues（修正版 3）
        script: |
          echo "=== MobileGlues 修正版 3 已載入 ==="
          set -euo pipefail
          cd "$CM_BUILD_DIR/Source"

          export GIT_TERMINAL_PROMPT=0
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

          rm -rf Natives/external/MobileGlues
          mkdir -p Natives/external

          clone_ok=0
          for attempt in 1 2 3 4; do
            echo "下載 MobileGlues，第 ${attempt}/4 次"
            rm -rf Natives/external/MobileGlues

            if git clone --depth 1               https://github.com/MobileGL-Dev/MobileGlues.git               Natives/external/MobileGlues; then
              clone_ok=1
              break
            fi

            echo "本次下載失敗，15 秒後重試"
            sleep 15
          done

          if [ "$clone_ok" -ne 1 ]; then
            echo "錯誤：MobileGlues 主倉庫連續 4 次下載失敗"
            exit 1
          fi

          cd Natives/external/MobileGlues

          submodule_ok=0
          for attempt in 1 2 3 4; do
            echo "下載 MobileGlues 子模組，第 ${attempt}/4 次"

            if git submodule sync --recursive &&
               git -c submodule.fetchJobs=1 submodule update                  --init --recursive --depth 1 --jobs 1; then
              submodule_ok=1
              break
            fi

            echo "子模組下載失敗，清理後重試"
            git submodule foreach --recursive 'git reset --hard || true; git clean -ffd || true' || true
            sleep 15
          done

          if [ "$submodule_ok" -ne 1 ]; then
            echo "錯誤：MobileGlues 子模組連續 4 次下載失敗"
            git submodule status --recursive || true
            exit 1
          fi

          if [ -f "src/main/cpp/CMakeLists.txt" ]; then
            echo "使用舊版 MobileGlues 目錄結構"
          elif [ -f "MobileGlues-cpp/CMakeLists.txt" ]; then
            echo "偵測到新版 MobileGlues 目錄結構，建立相容路徑"
            mkdir -p src/main
            rm -rf src/main/cpp
            ln -s "$PWD/MobileGlues-cpp" src/main/cpp
          else
            echo "錯誤：找不到 MobileGlues 的 CMakeLists.txt"
            find . -maxdepth 4 -name CMakeLists.txt -print
            exit 1
          fi

          ls -la src/main
          test -f src/main/cpp/CMakeLists.txt
          test -f src/main/cpp/3rdparty/SPIRV-Cross/CMakeLists.txt
          test -f src/main/cpp/3rdparty/glslang/CMakeLists.txt

          echo "MobileGlues 準備完成"

      - name: 修正新版 MobileGlues 建置規則
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/Source"

          python3 - <<'PY'
          from pathlib import Path

          makefile = Path("Makefile")
          text = makefile.read_text(encoding="utf-8")

          cmake_anchor = '-DMACOS="1" \\\n'
          cmake_insert = '-DMACOS="1" \\\n -DSPIRV_CROSS_SHARED=ON \\\n'

          old_build = "cmake --build $(WORKINGDIR)/mobileglues --config RelWithDebInfo -j$(JOBS) --target mobileglues"
          new_build = "cmake --build $(WORKINGDIR)/mobileglues --config RelWithDebInfo -j$(JOBS) --target mobileglues spirv-cross-c-shared"

          old_copy = "cp $(SOURCEDIR)/Natives/external/MobileGlues/src/main/cpp/libraries/ios/libspirv-cross-c-shared.0.dylib $(WORKINGDIR)/libspirv-cross-c-shared.0.dylib"
          new_copy = "find $(WORKINGDIR)/mobileglues -type f -name 'libspirv-cross-c-shared*.dylib' -print -quit | xargs -I{} cp '{}' $(WORKINGDIR)/libspirv-cross-c-shared.0.dylib"

          if cmake_anchor not in text:
              raise SystemExit("找不到 MobileGlues CMake 設定位置")
          if old_build not in text:
              raise SystemExit("找不到 MobileGlues build 規則")
          if old_copy not in text:
              raise SystemExit("找不到舊版 SPIRV-Cross 複製規則")

          text = text.replace(cmake_anchor, cmake_insert, 1)
          text = text.replace(old_build, new_build, 1)
          text = text.replace(old_copy, new_copy, 1)
          makefile.write_text(text, encoding="utf-8")
          PY

          grep -n "SPIRV_CROSS_SHARED\|spirv-cross-c-shared" Makefile

      - name: 清理舊建置檔
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/Source"
          rm -rf build
          rm -rf JavaApp/build
          rm -rf artifacts

      - name: 建置 IPA
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/Source"

          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          export BOOTJDK="$(/usr/libexec/java_home -v 1.8)/bin"

          gmake -j1 dsym package             PLATFORM="$PLATFORM"             RELEASE="$RELEASE"             SLIMMED="$SLIMMED"             JOBS=1             RUNNER=0

      - name: 檢查建置產物
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/Source"

          find artifacts -maxdepth 2 -type f \( -name "*.ipa" -o -name "*.tipa" \) -print

          if ! find artifacts -maxdepth 2 -type f \( -name "*.ipa" -o -name "*.tipa" \) | grep -q .; then
            echo "錯誤：沒有找到 IPA 或 TIPA"
            exit 1
          fi

    artifacts:
      - Source/artifacts/*.ipa
      - Source/artifacts/*.tipa
      - Source/artifacts/*.dSYM
